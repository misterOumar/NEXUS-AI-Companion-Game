<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXUS - AI Companion Game | Games On Web 2026" />
  <title>NEXUS - AI Companion Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
    }

    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #renderCanvas {
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
      touch-action: none;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.5s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 4rem;
      font-weight: 300;
      color: #fff;
      letter-spacing: 1rem;
      margin-bottom: 2rem;
      text-shadow: 0 0 30px rgba(100, 150, 255, 0.5);
    }

    .loading-subtitle {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.3rem;
      margin-bottom: 3rem;
    }

    .loading-bar-container {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a6cf7, #8b5cf6);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .loading-status {
      margin-top: 1rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="renderCanvas"></canvas>
    <div id="loading-screen">
      <h1 class="loading-title">NEXUS</h1>
      <p class="loading-subtitle">AI COMPANION GAME</p>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <p class="loading-status" id="loading-status">Initialisation...</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
